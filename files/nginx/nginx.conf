worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name matrix.${SERVER_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/matrix.${SERVER_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/matrix.${SERVER_DOMAIN}/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location /.well-known/matrix/client {
            return 200 '{"m.homeserver":{"base_url":"https://matrix.${SERVER_DOMAIN}"}}';
            add_header Content-Type application/json;
            add_header Access-Control-Allow-Origin *;
        }

        location / {
            proxy_pass http://synapse:8008;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            client_max_body_size 50M;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name ${SERVER_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${SERVER_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${SERVER_DOMAIN}/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location /.well-known/matrix/server {
            return 200 '{"m.server":"matrix.${SERVER_DOMAIN}:443"}';
            add_header Content-Type application/json;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name auth.${SERVER_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/auth.${SERVER_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/auth.${SERVER_DOMAIN}/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 443;

            proxy_buffer_size 8k;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name ${SERVER_DOMAIN} auth.${SERVER_DOMAIN} matrix.${SERVER_DOMAIN};
        return 301 https://$host$request_uri;
    }
}
